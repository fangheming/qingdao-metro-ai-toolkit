<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>岗点提醒助手 v2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#120a1e 0%,#1a102e 30%,#221540 60%,#120a1e 100%);color:#fff;min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:20px 16px}
.header{text-align:center;padding:20px 0 16px;border-bottom:1px solid rgba(180,100,255,.08);margin-bottom:18px}
.header .badge{display:inline-block;background:rgba(255,170,0,.1);border:1px solid rgba(255,170,0,.2);color:#fa0;padding:4px 14px;border-radius:12px;font-size:13px;letter-spacing:2px;margin-bottom:6px}
.header h1{font-size:28px;font-weight:900;background:linear-gradient(135deg,#fa0,#f80);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header .sub{font-size:13px;color:rgba(255,255,255,.35);margin-top:2px}
.tt-switch{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);border-radius:8px;margin-bottom:14px;font-size:14px}
.tt-switch label{color:rgba(255,255,255,.3);white-space:nowrap}
.tt-switch select{background:rgba(0,0,0,.3);border:1px solid rgba(251,146,60,.2);border-radius:6px;padding:6px 12px;color:#fff;font-size:14px;font-family:inherit;cursor:pointer}
.tt-switch .tt-badge{font-size:12px;padding:3px 10px;border-radius:4px}
.tt-badge.active{background:rgba(76,175,80,.1);color:#4caf50}
.mode-toggle{display:flex;margin-bottom:18px;border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,.06)}
.mode-btn{flex:1;padding:13px 8px;text-align:center;cursor:pointer;font-size:16px;font-weight:600;background:rgba(255,255,255,.02);color:rgba(255,255,255,.35);border:none;font-family:inherit;transition:all .2s}
.mode-btn+.mode-btn{border-left:1px solid rgba(255,255,255,.06)}
.mode-btn:hover{background:rgba(255,255,255,.04);color:rgba(255,255,255,.6)}
.mode-btn.active{background:rgba(255,170,0,.08);color:#fa0}
.mode-btn .mode-icon{display:block;font-size:24px}
.mode-btn .mode-label{display:block;font-size:13px;margin-top:2px;opacity:.7}
.depot-tabs{display:flex;gap:0;margin-bottom:18px;border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,.06)}
.depot-tab{flex:1;padding:14px 8px;text-align:center;cursor:pointer;font-size:16px;font-weight:600;background:rgba(255,255,255,.02);color:rgba(255,255,255,.35);border:none;font-family:inherit;transition:all .2s}
.depot-tab+.depot-tab{border-left:1px solid rgba(255,255,255,.06)}
.depot-tab:hover{background:rgba(255,255,255,.04);color:rgba(255,255,255,.6)}
.depot-tab.active{background:rgba(255,170,0,.08);color:#fa0}
.depot-tab .tab-count{display:block;font-size:24px;font-weight:900;line-height:1}
.depot-tab .tab-label{display:block;font-size:13px;margin-top:2px;opacity:.7}
.progress-wrap{margin-bottom:14px}
.progress-info{display:flex;justify-content:space-between;font-size:14px;margin-bottom:4px}
.progress-info span{color:rgba(255,255,255,.35)}
.progress-info .done-num{color:#4caf50}
.progress-bar{height:4px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#fa0,#4caf50);border-radius:2px;transition:width .4s}
.reminder-card{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);border-radius:12px;padding:20px;margin-bottom:10px;transition:all .2s}
.reminder-card:hover{background:rgba(255,255,255,.03)}
.reminder-card.done{opacity:.5;border-color:rgba(76,175,80,.15)}
.reminder-card.done .rc-train{text-decoration:line-through}
.reminder-card.warn-yellow{background:rgba(255,200,0,.12);border-color:rgba(255,200,0,.3)}
.reminder-card.warn-red{background:rgba(255,50,50,.12);border-color:rgba(255,50,50,.3)}
.reminder-card.warn-pulse{background:rgba(255,50,50,.15);border-color:rgba(255,50,50,.4);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 rgba(255,50,50,0)}50%{box-shadow:0 0 12px rgba(255,50,50,.2)}}
.countdown-bar{display:flex;align-items:center;gap:10px;padding:12px 16px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);border-radius:10px;margin-bottom:4px;font-size:15px}
.countdown-bar .cd-label{color:rgba(255,255,255,.3)}
.countdown-bar .cd-time{font-family:'SF Mono','Consolas',monospace;font-size:24px;font-weight:900;color:#fa0}
.countdown-bar .cd-now{font-family:'SF Mono','Consolas',monospace;font-size:20px;font-weight:700;color:rgba(255,255,255,.5)}
.countdown-bar .cd-time.urgent-yellow{color:#ffc800}
.countdown-bar .cd-time.urgent-red{color:#f33}
.countdown-bar .cd-time.urgent-pulse{color:#f33;animation:pulse 1s infinite}
.countdown-bar .cd-status{font-size:13px;padding:4px 12px;border-radius:6px}
.cd-status.normal{background:rgba(76,175,80,.1);color:#4caf50}
.cd-status.urgent{background:rgba(255,200,0,.1);color:#ffc800}
.cd-status.critical{background:rgba(255,50,50,.1);color:#f33}
.rc-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.rc-train{font-size:22px;font-weight:900;letter-spacing:1px}
.rc-route{font-size:22px;font-weight:900;color:#00e6b4}
.rc-label{font-size:22px;font-weight:900;color:rgba(255,255,255,.35)}
.rc-dir{font-size:13px;padding:3px 10px;border-radius:5px;font-weight:600}
.rc-dir.down{background:rgba(0,230,180,.1);color:#00e6b4}
.rc-dir.up{background:rgba(255,170,0,.1);color:#fa0}
.rc-tag{font-size:13px;padding:3px 10px;border-radius:5px;font-weight:600}
.rc-tag.full{background:rgba(180,100,255,.1);color:#b464ff}
.rc-tag.partial{background:rgba(255,82,82,.12);color:#ff5252}
.rc-station{font-size:15px;color:rgba(255,255,255,.45);margin-left:auto}
.rc-detail{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;font-size:15px;color:rgba(255,255,255,.5);margin-bottom:14px}
.rc-detail span{color:rgba(255,255,255,.3)}
.rc-detail strong{color:#fa0;font-family:'SF Mono','Consolas',monospace;font-weight:500}
.rc-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-remind{background:rgba(76,175,80,.1);border:1px solid rgba(76,175,80,.25);color:#4caf50}
.btn-remind:hover{background:rgba(76,175,80,.15)}
.btn-remind.done-state{background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.06);color:rgba(255,255,255,.3)}
.btn-preview{background:rgba(33,150,243,.1);border:1px solid rgba(33,150,243,.25);color:#2196f3}
.btn-preview:hover{background:rgba(33,150,243,.15)}
.empty{text-align:center;padding:40px;color:rgba(255,255,255,.15)}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:rgba(76,175,80,.15);border:1px solid rgba(76,175,80,.3);color:#4caf50;padding:10px 24px;border-radius:8px;font-size:15px;z-index:999;animation:toastIn .3s}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.warn-box{padding:16px 18px;background:rgba(255,170,0,.06);border:1px solid rgba(255,170,0,.12);border-radius:8px;margin-bottom:14px;font-size:16px;color:rgba(255,255,255,.5);text-align:center}
.voice-toggle{display:flex;align-items:center;gap:10px;padding:8px 12px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);border-radius:8px;margin-bottom:14px;font-size:14px;cursor:pointer;user-select:none}
.voice-toggle .vt-label{color:rgba(255,255,255,.3)}
.voice-toggle .vt-switch{width:44px;height:24px;background:rgba(255,255,255,.1);border-radius:12px;position:relative;transition:all .3s;flex-shrink:0}
.voice-toggle .vt-switch::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fff;border-radius:50%;transition:all .3s}
.voice-toggle.on .vt-switch{background:#4caf50}
.voice-toggle.on .vt-switch::after{left:22px}
.voice-toggle .vt-status{font-size:13px;font-weight:600;padding:2px 10px;border-radius:4px;transition:all .3s}
.voice-toggle .vt-status.on{color:#4caf50;background:rgba(76,175,80,.1)}
.voice-toggle .vt-status.off{color:#ff5252;background:rgba(255,82,82,.1)}
.role-selector{padding:8px 12px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);border-radius:8px;margin-bottom:14px;font-size:14px;display:flex;align-items:center;gap:8px}
.role-selector label{color:rgba(255,255,255,.3);white-space:nowrap}
.role-selector select{background:rgba(0,0,0,.3);border:1px solid rgba(33,150,243,.2);border-radius:6px;padding:6px 12px;color:#fff;font-size:14px;font-family:inherit;cursor:pointer;flex:1}
.role-selector .role-badge{font-size:12px;padding:3px 10px;border-radius:4px;flex-shrink:0}
.role-badge.selected{background:rgba(33,150,243,.1);color:#2196f3}
.role-badge.none{background:rgba(255,255,255,.03);color:rgba(255,255,255,.25)}
</style>
</head>
<body>
<div class="container">

<div class="header">
  <div class="badge">乘务专业AI工具集 · v2</div>
  <h1>🔔 岗点提醒助手</h1>
  <div class="sub">首末班车 · 跳停回厂 · 接车倒计时 · 双时刻表</div>
</div>

<div class="tt-switch">
  <label>时刻表</label>
  <select id="ttSelect" onchange="switchTimetable(this.value)">
    <option value="Z01152" selected>Z01152（工作日）</option>
    <option value="Z01647">Z01647（周末）</option>
  </select>
  <span class="tt-badge active" id="ttBadge">数据就绪</span>
</div>

<div class="voice-toggle on" id="voiceToggle" onclick="toggleVoice()">
  <span class="vt-label">🔊 语音提醒</span>
  <div class="vt-switch"></div>
  <span class="vt-status on" id="voiceStatus">已开启</span>
</div>

<div class="role-selector">
  <label>岗位</label>
  <select id="roleSelect" onchange="switchRole(this.value)">
    <option value="none" selected>不选择岗位</option>
    <option value="瓦屋庄派班">瓦屋庄派班员</option>
    <option value="东郭庄派班">东郭庄派班员</option>
    <option value="安顺派班">安顺派班员</option>
    <option value="东郭庄轮值">东郭庄轮值</option>
    <option value="王家港轮值">王家港轮值</option>
  </select>
  <span class="role-badge none" id="roleBadge">不触发语音</span>
</div>

<div class="mode-toggle">
  <button class="mode-btn active" id="btnFirst" onclick="switchMode('first')">
    <span class="mode-icon">🌅</span><span class="mode-label">首班车提醒</span>
  </button>
  <button class="mode-btn" id="btnLast" onclick="switchMode('last')">
    <span class="mode-icon">🌙</span><span class="mode-label">末班车提醒</span>
  </button>
  <button class="mode-btn" id="btnSkip" onclick="switchMode('skip')">
    <span class="mode-icon">🏃</span><span class="mode-label">跳停回厂</span>
  </button>
</div>

<div id="infoBanner" style="display:none;padding:14px 18px;background:rgba(255,82,82,.08);border:1px solid rgba(255,82,82,.15);border-radius:8px;margin-bottom:14px;font-size:14px">
  <span style="color:#ff5252;font-weight:700">⚠ 提醒内容：</span>
  <span style="color:rgba(255,255,255,.8)">关闭照明、关闭空调，门模式开关置MM位，带好备品</span>
</div>

<div id="countdownBar" class="countdown-bar" style="display:none">
  <span class="cd-label">当前</span>
  <span class="cd-now" id="cdNow">--:--:--</span>
  <span class="cd-label" id="cdLabel1">距发车</span>
  <span class="cd-time" id="cdTime1">--:--:--</span>
  <span class="cd-label" id="cdLabel2" style="display:none">非全程</span>
  <span class="cd-time" id="cdTime2" style="display:none">--:--:--</span>
  <span class="cd-status normal" id="cdStatus">就绪</span>
</div>

<div class="depot-tabs" id="depotTabs"></div>

<div class="progress-wrap">
  <div class="progress-info">
    <span id="progressLabel">今日提醒进度</span>
    <span class="done-num" id="progressNum">0/0</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</div>

<div id="reminderList"></div>

</div>

<!-- Timetable data files -->
<script src="Z01152_data.js"></script>
<script src="Z01647_data.js"></script>

<script>
// ============ TIMETABLE ENGINE ============
let currentTT = 'Z01152';
let TT = null;        // active timetable data
let tmap = {};        // trainNo → train object

function loadTT(key) {
  currentTT = key;
  TT = key === 'Z01152' ? Z01152_DATA : Z01647_DATA;
  tmap = {};
  for (var i = 0; i < TT.trains.length; i++) {
    tmap[TT.trains[i].no] = TT.trains[i];
  }
  var badge = document.getElementById('ttBadge');
  if (key === 'Z01152') {
    badge.textContent = '数据就绪';
    badge.className = 'tt-badge active';
  } else {
    var hasConfig = TRAIN_CONFIG[key] && TRAIN_CONFIG[key].first;
    badge.textContent = hasConfig ? '数据就绪' : '⚠ 缺配置';
    badge.className = 'tt-badge ' + (hasConfig ? 'active' : '');
  }
}

// Lookup helpers
function ttRoute(trainNo) {
  var t = tmap[trainNo];
  if (!t) return '';
  if (t.routes && t.routes.length > 0) return t.routes[0];
  return t.pickup || '';
}

function ttDepart(trainNo) {
  var t = tmap[trainNo];
  if (!t) return '--:--:--';
  var s = t.stations[0];
  return s.b || s.a || '--:--:--';
}

function ttStart(trainNo) {
  var t = tmap[trainNo];
  if (!t) return '--';
  return t.start;
}

function ttEnd(trainNo) {
  var t = tmap[trainNo];
  if (!t) return '--';
  return t.end;
}

function ttFirstRoute(trainNo) {
  var t = tmap[trainNo];
  if (!t) return '';
  for (var i = 0; i < t.stations.length; i++) {
    if (t.stations[i].route) return t.stations[i].route;
  }
  return '';
}

// Get time at specific station
function ttStationTime(trainNo, stationName, field) {
  var t = tmap[trainNo];
  if (!t) return '--:--:--';
  field = field || 'a';
  for (var i = 0; i < t.stations.length; i++) {
    if (t.stations[i].n === stationName) {
      return t.stations[i][field] || t.stations[i].a || t.stations[i].b || '--:--:--';
    }
  }
  return '--:--:--';
}

// ============ TRAIN CONFIG ============

// Route names and times are pulled dynamically from the timetable above

    // 东郭庄停车场
    { depot:'东郭庄', trainNo:'221016', label:'东郭庄下行首班', factoryTrain:'221016', factoryDepot:'东郭庄停车场', factoryTime:'05:27:26', departTime:'05:30:00' },
    // 安顺车辆段
    { depot:'安顺',   trainNo:'031019', label:'瑞金路下行首班',   factoryTrain:'032001', factoryDepot:'安顺车辆段',   factoryTime:'05:00:27', departTime:'05:30:00' },
    { depot:'安顺',   trainNo:'181018', label:'青岛北站下行首班', factoryTrain:'182013', factoryDepot:'安顺车辆段',   factoryTime:'05:24:32', departTime:'05:30:00' },

  ],

var DEPOT_LABELS = { '瓦屋庄':'瓦屋庄停车场', '安顺':'安顺车辆段', '东郭庄':'东郭庄停车场' };
var STATION_LABELS = { '东郭庄':'东郭庄轮值', '王家港':'王家港轮值' };

// ============ APP STATE ============
var mode = 'first';
var currentDepot = '瓦屋庄';
var currentStation = '东郭庄';

function switchTimetable(key) {
  loadTT(key);
  render();
}

function switchMode(m) {
  mode = m;
  document.getElementById('btnFirst').classList.toggle('active', m === 'first');
  document.getElementById('btnLast').classList.toggle('active', m === 'last');
  document.getElementById('btnSkip').classList.toggle('active', m === 'skip');
  spokenAlerts = new Set();
  render();
}

function switchDepot(d) { currentDepot = d; render(); }
function switchStation(s) { currentStation = s; render(); }

// ============ RENDER ============
function render() {
  if (mode === 'first') renderFirst();
  else if (mode === 'last') renderLast();
  else renderSkip();
}

function hasConfig() {
  var cfg = TRAIN_CONFIG[currentTT];
  if (!cfg) return false;
  if (mode === 'first') return cfg.first && cfg.first.length > 0;
  if (mode === 'last') return cfg.last && cfg.last.length > 0;
  return cfg.skip && cfg.skip.length > 0;
}

function renderFirst() {
  document.getElementById('infoBanner').style.display = 'none';
  var cfg = TRAIN_CONFIG[currentTT];
  if (!cfg || !cfg.first || cfg.first.length === 0) {
    document.getElementById('reminderList').innerHTML = '<div class="warn-box">⚠ ' + currentTT + ' 首班车配置尚未录入，请联系方师傅提供周末车次配置</div>';
    document.getElementById('depotTabs').innerHTML = '';
    document.getElementById('progressNum').textContent = '0/0';
    document.getElementById('progressFill').style.width = '0%';
    return;
  }

  var depots = ['瓦屋庄','东郭庄','安顺'];
  var tabs = document.getElementById('depotTabs');
  tabs.style.display = 'flex';
  tabs.innerHTML = depots.map(function(d) {
    var trains = cfg.first.filter(function(t) { return t.depot === d; });

function renderSkip() {
  document.getElementById('infoBanner').style.display = 'block';
  var cfg = TRAIN_CONFIG[currentTT];
  if (!cfg || !cfg.skip || cfg.skip.length === 0) {
    document.getElementById('reminderList').innerHTML = '<div class="warn-box">⚠ ' + currentTT + ' 跳停车配置尚未录入，请联系方师傅提供周末车次配置</div>';
    document.getElementById('depotTabs').innerHTML = '';
    document.getElementById('progressNum').textContent = '0/0';
    document.getElementById('progressFill').style.width = '0%';
    return;
  }

  var stations = ['东郭庄','王家港'];
  var tabs = document.getElementById('depotTabs');
  tabs.style.display = 'flex';
  tabs.innerHTML = stations.map(function(sn) {
    var trains = cfg.skip.filter(function(t) { return t.station === sn; });
    var active = sn === currentStation ? ' active' : '';
    return '<button class="depot-tab' + active + '" onclick="switchStation(\'' + sn + '\')"><span class="tab-count">' + trains.length + '</span><span class="tab-label">' + (STATION_LABELS[sn] || sn) + '</span></button>';
  }).join('');

  var trains = cfg.skip.filter(function(t) { return t.station === currentStation; });
  var total = trains.length;
  document.getElementById('progressLabel').textContent = '跳停回厂 · ' + (STATION_LABELS[currentStation] || currentStation);
  document.getElementById('progressNum').textContent = total + '辆';
  document.getElementById('progressFill').style.width = '0%';

  // Mark passed/upcoming and find first upcoming index
  var now = new Date();
  var nowStr = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0') + ':' + String(now.getSeconds()).padStart(2,'0');
  var firstUpcoming = -1;
  trains.forEach(function(t, i) {
    var pt = ttStationTime(t.pickupTrain, t.pickupAt, 'a');
    if (firstUpcoming < 0 && (pt === '--:--:--' || pt > nowStr)) firstUpcoming = i;
  });

  document.getElementById('reminderList').innerHTML = trains.map(function(t, i) {
    var train = tmap[t.trainNo];
    var route = ttRoute(t.trainNo);
    var dir = train ? (train.dir === 1 ? '下行' : '上行') : '--';
    var dirCls = dir === '下行' ? 'down' : 'up';
    var dirText = dir === '下行' ? '▼下行' : '▲上行';
    var depart = t.departTime || ttDepart(t.trainNo);
    var endTime = t.depotTime || ttStationTime(t.trainNo, t.endDepot.replace('车辆段','').replace('停车场',''), 'a');
    var pickupTime = ttStationTime(t.pickupTrain, t.pickupAt, 'a');
    var startStation = ttStart(t.trainNo);
    var isPassed = i < firstUpcoming;
    return '<div class="reminder-card' + (isPassed ? ' done' : '') + '"' + (i === firstUpcoming ? ' id="skip-first-upcoming"' : '') + '>' +
      '<div class="rc-top">' +
        '<span class="rc-train">' + t.trainNo + '</span>' +
        '<span class="rc-route">' + route + '</span>' +
        '<span class="rc-dir ' + dirCls + '">' + dirText + '</span>' +
        '<span class="rc-station">' + startStation + '站发 → ' + t.endDepot + '</span>' +
      '</div>' +
      '<div class="rc-detail">' +
        '<div><span>接车时间</span> <strong>' + pickupTime + '</strong></div>' +
        '<div><span>接车车次</span> <strong>' + t.pickupTrain + '</strong></div>' +
        '<div><span>发车时间</span> <strong>' + depart + '</strong></div>' +
        '<div><span>回厂时间</span> <strong>' + endTime + '</strong></div>' +
      '</div>' +
      '<div class="rc-actions"><button class="btn btn-preview" onclick="event.stopPropagation();playPreview(\'' + t.trainNo + '\')">🔊 试听</button></div>' +
    '</div>';
  }).join('');

  // Auto-scroll to first upcoming card
  if (firstUpcoming >= 0) {
    setTimeout(function() {
      var el = document.getElementById('skip-first-upcoming');
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);
  }
}

// ============ SPEECH ============
var spokenAlerts = new Set();
var voiceEnabled = true;

function tnSpoken(tno) {
  var digMap = {'0':'洞','1':'幺','2':'两','3':'三','4':'四','5':'五','6':'六','7':'拐','8':'八','9':'玖'};
  var p1 = tno.slice(0,2).split('').map(function(c){return digMap[c]||c;}).join('');
  var p2 = tno.slice(2).split('').map(function(c){return digMap[c]||c;}).join('');
  return p1 + ' ' + p2;
}

function toggleVoice() {
  voiceEnabled = !voiceEnabled;
  var toggle = document.getElementById('voiceToggle');
  var status = document.getElementById('voiceStatus');
  if (voiceEnabled) {
    toggle.classList.add('on');
    status.className = 'vt-status on';
    status.textContent = '已开启';
  } else {
    toggle.classList.remove('on');
    status.className = 'vt-status off';
    status.textContent = '已关闭';
  }
}

var selectedRole = 'none';

function switchRole(role) {
  selectedRole = role;
  var badge = document.getElementById('roleBadge');
  spokenAlerts = new Set();
  
  if (role === 'none') {
    voiceEnabled = false;
    document.getElementById('voiceToggle').classList.remove('on');
    document.getElementById('voiceStatus').className = 'vt-status off';
    document.getElementById('voiceStatus').textContent = '已关闭';
    badge.className = 'role-badge none';
    badge.textContent = '不触发语音';
  } else {
    voiceEnabled = true;
    document.getElementById('voiceToggle').classList.add('on');
    document.getElementById('voiceStatus').className = 'vt-status on';
    document.getElementById('voiceStatus').textContent = '已开启';
    badge.className = 'role-badge selected';
    badge.textContent = '语音已激活';
    
    // Auto-switch to correct mode and tab
    if (role === '瓦屋庄派班' || role === '东郭庄派班' || role === '安顺派班') {
      var depot = role.replace('派班','');
      currentDepot = depot;
      switchMode('first');
      // Re-render will show the correct depot tab
    } else if (role === '东郭庄轮值' || role === '王家港轮值') {
      var station = role.replace('轮值','');
      currentStation = station;
      switchMode('last');
    }
  }
}

function sayText(text) {
  if (!voiceEnabled) return;
  var u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN'; u.rate = 0.85; u.pitch = 1.0;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

function forceSay(text) {
  var u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN'; u.rate = 0.85; u.pitch = 1.0;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

function playPreview(trainNo) {
  var cfg = TRAIN_CONFIG[currentTT];
  if (!cfg) return;
  var tc = null;
  if (mode === 'first') {
    tc = (cfg.first || []).find(function(t){return t.trainNo===trainNo;});
  } else if (mode === 'last') {
    tc = (cfg.last || []).find(function(t){return t.trainNo===trainNo;});
  } else {
    tc = (cfg.skip || []).find(function(t){return t.trainNo===trainNo;});
  }
  if (!tc) return;
  var train = tmap[tc.trainNo];
  var dir = train ? (train.dir===1?'下形':'上形') : '';
  var tn = tnSpoken(tc.trainNo);
  var text;
  if (mode === 'first') {
    var station = tc.label.replace('下行首班','').replace('上行首班','');
    text = station + dir + '首班车' + tn + '次即将发车，请派班员做好发车提醒';
  } else if (mode === 'last') {
    var station = tc.station;
    var fullText = tc.type==='全程'?'全程':'非全程';
    text = station + dir + fullText + '末班车' + tn + '次即将发车，请' + station + '轮值做好提醒';
  } else {
    var depot = tc.endDepot.replace('车辆段','').replace('停车场','');
    var station = tc.station;
    text = depot + '高峰跳停回厂车' + tn + '次即将接车，请' + station + '轮值做好接车提醒';
  }
  forceSay(text);
}

// ============ COUNTDOWN ============
function updateCountdown() {
  var bar = document.getElementById('countdownBar');
  var timeEl1 = document.getElementById('cdTime1');
  var timeEl2 = document.getElementById('cdTime2');
  var label1 = document.getElementById('cdLabel1');
  var label2 = document.getElementById('cdLabel2');
  var statusEl = document.getElementById('cdStatus');
  
  bar.style.display = 'flex';
  var now = new Date();
  document.getElementById('cdNow').textContent = 
    String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0') + ':' + String(now.getSeconds()).padStart(2,'0');
  
  if (!hasConfig()) { timeEl1.textContent = '--:--:--'; return; }

  var targets = [];
  var speechTargets = [];
  if (mode === 'first') {
    targets = [{ h:5, m:30, s:0 }];
    label1.textContent = '距发车';
    label2.style.display = 'none';
    timeEl2.style.display = 'none';
  } else if (mode === 'last') {
    label1.textContent = '全程';
    label2.style.display = 'inline';
    timeEl2.style.display = 'inline';
    label2.textContent = '非全程';
    var lastCfg = TRAIN_CONFIG[currentTT];
    var lastTrains = lastCfg && lastCfg.last ? lastCfg.last.filter(function(t){return t.station===currentStation;}) : [];
    for (var j = 0; j < lastTrains.length; j++) {
      var bt = ttStationTime(lastTrains[j].trainNo, currentStation, 'b');
      if (bt && bt !== '--:--:--') {
        var bparts = bt.split(':');
        targets.push({ h: parseInt(bparts[0]), m: parseInt(bparts[1]), s: parseInt(bparts[2]) });
      }
      var at = ttStationTime(lastTrains[j].trainNo, currentStation, 'a');
      if (at && at !== '--:--:--') {
        var aparts = at.split(':');
        speechTargets.push({ h: parseInt(aparts[0]), m: parseInt(aparts[1]), s: parseInt(aparts[2]) });
      }
    }
    if (targets.length === 0) targets = [{ h:0, m:0, s:0 }];
    if (speechTargets.length === 0) speechTargets = targets;
  } else {
    label2.style.display = 'none';
    timeEl2.style.display = 'none';
    var cfg = TRAIN_CONFIG[currentTT];
    var skipTrains = cfg && cfg.skip ? cfg.skip.filter(function(t) { return t.station === currentStation; }) : [];
    var nextTrain = null, nextTarget = null;
    for (var i = 0; i < skipTrains.length; i++) {
      var t = skipTrains[i];
      var pickupTime = ttStationTime(t.pickupTrain, t.pickupAt, 'a');
      if (pickupTime === '--:--:--') continue;
      var parts = pickupTime.split(':'); var ph = +parts[0], pm = +parts[1], ps = +parts[2] || 0;
      var pt = new Date(now); pt.setHours(ph, pm, ps, 0);
      if (now < pt && (!nextTarget || pt < nextTarget)) { nextTrain = t; nextTarget = pt; }
    }
    if (nextTrain && nextTarget) {
      targets = [{ h: nextTarget.getHours(), m: nextTarget.getMinutes(), s: nextTarget.getSeconds() }];
      var route = ttRoute(nextTrain.trainNo);
      label1.textContent = nextTrain.trainNo + '（' + route + '）←' + nextTrain.pickupTrain;
    } else {
      timeEl1.textContent = '--:--:--';
      statusEl.className = 'cd-status normal'; statusEl.textContent = '今日已完'; return;
    }
  }
  
  var minLeft = Infinity;
  for (var i = 0; i < targets.length; i++) {
    var el = i === 0 ? timeEl1 : timeEl2;
    var t = targets[i], target = new Date(now);
    target.setHours(t.h, t.m, t.s, 0);
    var diff = target - now;
    if (diff < 0) {
      el.textContent = '已发车'; el.className = 'cd-time';
    } else {
      var hh = Math.floor(diff / 3600000);
      var mm = Math.floor((diff % 3600000) / 60000);
      var ss = Math.floor((diff % 60000) / 1000);
      el.textContent = String(hh).padStart(2,'0') + ':' + String(mm).padStart(2,'0') + ':' + String(ss).padStart(2,'0');
      el.className = 'cd-time';
      minLeft = Math.min(minLeft, diff / 60000);
    }
  }
  
  timeEl1.classList.remove('urgent-yellow','urgent-red');
  timeEl2.classList.remove('urgent-yellow','urgent-red');
  
  if (minLeft === Infinity || minLeft < 0) { statusEl.textContent = '今日已过'; return; }

  // Speech uses arrival time targets for末班车
  var speechMinLeft = minLeft;
  if (mode === 'last' && speechTargets.length > 0) {
    speechMinLeft = Infinity;
    for (var si = 0; si < speechTargets.length; si++) {
      var st = speechTargets[si], starget = new Date(now);
      starget.setHours(st.h, st.m, st.s, 0);
      var sdiff = starget - now;
      if (sdiff >= 0) speechMinLeft = Math.min(speechMinLeft, sdiff / 60000);
    }
  }
  
  if (minLeft <= 1) {
    timeEl1.classList.add('urgent-pulse');
    if (targets.length > 1 && timeEl2.textContent !== '已发车') timeEl2.classList.add('urgent-pulse');
    statusEl.className = 'cd-status critical'; statusEl.textContent = '⚠ 紧急';
  } else if (minLeft <= 2) {
    timeEl1.classList.add('urgent-red');
    if (targets.length > 1 && timeEl2.textContent !== '已发车') timeEl2.classList.add('urgent-red');
    statusEl.className = 'cd-status critical'; statusEl.textContent = '⚠ 紧急';
    if (Math.floor(speechMinLeft) === 2) speakCurrent(speechMinLeft);
  } else if (minLeft <= 3) {
    timeEl1.classList.add('urgent-yellow');
    if (targets.length > 1 && timeEl2.textContent !== '已发车') timeEl2.classList.add('urgent-yellow');
    statusEl.className = 'cd-status urgent'; statusEl.textContent = '⚡ 告警';
    if (Math.floor(speechMinLeft) === 3) speakCurrent(speechMinLeft);
  } else {
    statusEl.className = 'cd-status normal'; statusEl.textContent = '就绪';
  }
  
  var cards = document.querySelectorAll('.reminder-card');
  for (var i = 0; i < cards.length; i++) {
    cards[i].classList.remove('warn-yellow','warn-red','warn-pulse');
    if (minLeft < 0) cards[i].classList.add('done');
    else if (minLeft <= 1) cards[i].classList.add('warn-pulse');
    else if (minLeft <= 2) cards[i].classList.add('warn-red');
    else if (minLeft <= 3) cards[i].classList.add('warn-yellow');
  }
}

function roleMatches() {
  if (selectedRole === 'none') return false;
  if (selectedRole === '瓦屋庄派班') return mode === 'first' && currentDepot === '瓦屋庄';
  if (selectedRole === '东郭庄派班') return mode === 'first' && currentDepot === '东郭庄';
  if (selectedRole === '安顺派班') return mode === 'first' && currentDepot === '安顺';
  if (selectedRole === '东郭庄轮值') return currentStation === '东郭庄' && (mode === 'last' || mode === 'skip');
  if (selectedRole === '王家港轮值') return currentStation === '王家港' && (mode === 'last' || mode === 'skip');
  return false;
}

function speakCurrent(minutes) {
  if (!roleMatches()) return;
  var cfg = TRAIN_CONFIG[currentTT];
  if (!cfg) return;
  var trains;
  if (mode === 'first') trains = (cfg.first || []).filter(function(t) { return t.depot === currentDepot; });
  else if (mode === 'last') trains = (cfg.last || []).filter(function(t) { return t.station === currentStation; });
  else trains = (cfg.skip || []).filter(function(t) { return t.station === currentStation; });
  for (var i = 0; i < trains.length; i++) {
      var key = mode + '-' + trains[i].trainNo + '-' + Math.floor(minutes);
      if (spokenAlerts.has(key)) continue;
      spokenAlerts.add(key);
      var train = tmap[trains[i].trainNo];
      var dir = train ? (train.dir === 1 ? '下形' : '上形') : '';
      var tn = tnSpoken(trains[i].trainNo);
      if (mode === 'first') {
        var station = trains[i].label.replace('下行首班','').replace('上行首班','');
        var text = station + dir + '首班车' + tn + '次即将发车，请派班员做好发车提醒';
        sayText(text);
      } else if (mode === 'last') {
        var station = trains[i].station;
        var fullText = trains[i].type === '全程' ? '全程' : '非全程';
        var text = station + dir + fullText + '末班车' + tn + '次即将发车，请' + station + '轮值做好发车提醒';
        sayText(text);
      } else {
        var depot = trains[i].endDepot.replace('车辆段','').replace('停车场','');
        var station = trains[i].station;
        var text = depot + '高峰跳停回厂车' + tn + '次即将接车，请' + station + '轮值做好接车提醒';
        sayText(text);
      }
  }
}

function showToast(msg) {
  var existing = document.querySelector('.toast');
  if (existing) existing.remove();
  var el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(function() { el.remove(); }, 2000);
}

loadTT('Z01152');
setInterval(updateCountdown, 1000);
updateCountdown();
render();
</script>
