<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>备车替换助手</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#1e0a1a,#2a1020,#341530,#1e0a1a);color:#fff;min-height:100vh}
.container{max-width:780px;margin:0 auto;padding:30px 20px}
.header{text-align:center;padding:20px 0;border-bottom:1px solid rgba(255,50,80,.08);margin-bottom:24px}
.header .badge{display:inline-block;background:rgba(255,50,80,.1);border:1px solid rgba(255,50,80,.2);color:#ff5060;padding:4px 14px;border-radius:12px;font-size:13px;letter-spacing:2px;margin-bottom:8px}
.header h1{font-size:28px;font-weight:900;background:linear-gradient(135deg,#ff5060,#ff3060);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .sub{font-size:13px;color:rgba(255,255,255,.35);margin-top:4px}

.top-bar{display:flex;align-items:center;padding:8px 14px;background:rgba(255,255,255,.03);border-radius:10px;margin-bottom:18px;font-size:14px;gap:14px}
.tb-label{color:rgba(255,255,255,.4);font-size:13px;white-space:nowrap}
.top-bar select{background:rgba(0,0,0,.3);border:1px solid rgba(255,50,80,.2);border-radius:6px;padding:6px 10px;color:#fff;font-size:14px;font-family:inherit}
.top-bar select option{background:#1e0a1a}

.qf{background:rgba(255,255,255,.03);border:1px solid rgba(255,50,80,.1);border-radius:12px;padding:18px;margin-bottom:20px}
.qf-row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
.qf-group{display:flex;flex-direction:column;gap:5px;flex:1;min-width:100px}
.qf-group label{font-size:13px;color:rgba(255,255,255,.4)}
.qf-group input,.qf-group select{background:rgba(0,0,0,.3);border:1px solid rgba(255,50,80,.15);border-radius:8px;padding:12px;color:#fff;font-size:16px;font-family:inherit;outline:none}
.qf-group input:focus,.qf-group select:focus{border-color:#ff5060}
.qf-group select option{background:#1e0a1a}
.btn{border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;letter-spacing:.5px;transition:all .2s;padding:12px 28px;white-space:nowrap}
.btn-p{background:linear-gradient(135deg,#ff5060,#ff3060);color:#fff}
.btn-p:hover{box-shadow:0 4px 16px rgba(255,50,80,.3);transform:translateY(-1px)}

.result{background:rgba(255,255,255,.03);border:1px solid rgba(255,50,80,.08);border-radius:14px;padding:24px;margin-bottom:16px}
.result h3{font-size:18px;margin-bottom:16px}

.flow{display:flex;align-items:center;gap:12px;margin:16px 0;flex-wrap:wrap;font-size:14px}
.flow-box{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:12px 16px;text-align:center;min-width:90px}
.flow-box>div:first-child{font-size:11px;color:rgba(255,255,255,.3);margin-bottom:4px}
.flow-box .num{font-size:16px;font-weight:900}
.flow-box.fault{border-color:rgba(255,50,80,.3)}.flow-box.fault .num{color:#ff5060}
.flow-box.turn{border-color:rgba(74,222,128,.2)}.flow-box.turn .num{color:#4ade80}
.flow-box.driver{border-color:rgba(255,170,0,.2)}.flow-box.driver .num{color:#fa0}
.flow-arrow{font-size:20px;color:rgba(255,255,255,.15)}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 20px;margin:12px 0;font-size:14px}
.kv .key{color:rgba(255,255,255,.35)}.kv .val{color:#fff;font-weight:500}

.driver-card{background:rgba(255,170,0,.04);border:1px solid rgba(255,170,0,.12);border-radius:12px;padding:16px;margin-top:14px}
.driver-card h4{font-size:15px;color:#fa0;margin-bottom:8px}

.alert{background:rgba(255,50,80,.06);border:1px solid rgba(255,50,80,.15);border-radius:10px;padding:18px;margin-top:14px;line-height:2.2}
.alert h4{font-size:15px;color:#ff5060;margin-bottom:8px}
.alert ol{color:rgba(255,255,255,.7);font-size:14px;padding-left:20px}
.alert ol li{padding:2px 0}

.empty{text-align:center;padding:50px;color:rgba(255,255,255,.2)}.empty .ph-icon{font-size:40px;margin-bottom:10px}
</style>
</head>

<div class="container">
<div class="header"><div class="badge">乘务专业AI工具集</div><h1>🚗 备车替换助手</h1><div class="sub">故障车次 → 折返后车次 → 时刻表 pickup → 提醒接车</div></div>

<div class="top-bar"><span class="tb-label">📅 时刻表</span><select id="ttSelect"></select></div>

<div class="qf">
<div class="qf-row">
<div class="qf-group" style="max-width:180px"><label>故障车次号</label><input type="text" id="faultTrain" placeholder="4位或6位" autocomplete="off"></div>
<div class="qf-group" style="max-width:160px"><label>转备车站</label><select id="spareStn"><option value="王家港">王家港</option><option value="东郭庄">东郭庄</option></select></div>
<button class="btn btn-p" onclick="go()">查询</button>
</div>
</div>

<div id="results"><div class="empty"><div class="ph-icon">🚗</div>输入故障车次号并选择转备用车站</div></div>
</div>

function t2(t){if(!t)return 0;var p=t.split(':');return(+p[0])*3600+(+p[1])*60+(+p[2]||0)}

function resolve(no){
  no=no.trim();if(!no)return null;
  var ts=S().trains;
  if(no.length===6){for(var i=0;i<ts.length;i++){if(ts[i].no===no)return no}return null}
  var d=parseInt(no[0]),s4=no.slice(-4);
  for(var i=0;i<ts.length;i++){if(ts[i].no.slice(-4)===s4&&ts[i].dir===d)return ts[i].no}
  for(var i=0;i<ts.length;i++){if(ts[i].no.slice(-4)===s4)return ts[i].no}
  return null
}

function getT(no){
  var ts=S().trains;for(var i=0;i<ts.length;i++){if(ts[i].no===no)return ts[i]};return null
}

// 折返后：同表号、对向、在终端始发、紧随到达时间
function findTurn(biao,fDir,term,arrT){
  var ts=S().trains,cands=[];
  for(var i=0;i<ts.length;i++){
    var t=ts[i];if(t.no.slice(0,2)!==biao)continue;if(t.dir===fDir)continue;
    var fs=t.stations[0];if(fs.n.indexOf(term)<0)continue;if(!fs.b)continue;
    if(fs.b>arrT)cands.push({no:t.no,dep:fs.b})
  }
  cands.sort(function(a,b){return a.dep>b.dep?1:-1});
  return cands[0]?cands[0].no:null
}

function go(){
  var fn=document.getElementById('faultTrain').value.trim();
  var term=document.getElementById('spareStn').value;
  var r=document.getElementById('results');
  if(!fn){r.innerHTML='<div class="empty"><div class="ph-icon">⚠</div>请输入故障车次号</div>';return}

  var fullNo=resolve(fn);
  if(!fullNo){r.innerHTML='<div class="empty"><div class="ph-icon">🔍</div>未找到：'+fn+'</div>';return}
  var tr=getT(fullNo);if(!tr){r.innerHTML='<div class="empty"><div class="ph-icon">⚠</div>数据异常</div>';return}

  var biao=fullNo.slice(0,2);
  var veh=VEHICLE[biao]||'?';
  var dText=tr.dir===1?'下行':'上行';
  var ss=tr.stations,last=ss[ss.length-1],arrT=last.a||last.b;
  var fb=findTurn(biao,tr.dir,term,arrT);

  var html='<div class="result"><h3>🚗 '+fullNo+'（'+dText+'）→ '+term+' 转备用</h3>';
  html+='<div class="info-grid"><div class="kv"><span class="key">表号</span><br><span class="val">'+biao+'</span></div><div class="kv"><span class="key">车组号</span><br><span class="val">'+veh+'</span></div><div class="kv"><span class="key">到达终点</span><br><span class="val">'+last.n+' '+arrT+'</span></div><div class="kv"><span class="key">转备车站</span><br><span class="val">'+term+'</span></div></div>';

  if(!fb){
    html+='<div style="font-size:14px;color:rgba(255,255,255,.5);margin:12px 0">⚠ 在 '+term+' 未找到折返后车次</div>';
  }else{
    var fbT=getT(fb),fbD=fbT?fbT.dir===1?'下行':'上行':'?';
    var routes=fbT&&fbT.routes?fbT.routes:[];
    var pickup=routes.length>0?routes[0]:'';

    html+='<div class="flow"><div class="flow-box fault"><div>故障列车</div><div class="num">'+fullNo+'</div></div><div class="flow-arrow">→</div><div class="flow-box turn"><div>折返后车次</div><div class="num">'+fb+'</div><div style="font-size:11px;color:rgba(255,255,255,.4);margin-top:4px">'+fbD+' 始发'+term+'</div></div>';

    if(pickup){
      var jl=J(),rinfo=(jl.r||{})[pickup]||{};
      html+='<div class="flow-arrow">→</div><div class="flow-box driver"><div>接车交路</div><div class="num">'+pickup+'</div><div style="font-size:11px;color:rgba(255,255,255,.4);margin-top:4px">'+rinfo.out+' '+rinfo.t_out+' → '+rinfo.back+' '+rinfo.t_back+'</div></div></div>';

      html+='<div class="alert"><h4>⚠ '+pickup+' 接车司机提醒</h4><ol>';
      html+='<li>故障车 <b>'+fullNo+'</b> 在 '+term+' 转为备用，其折返后车次 <b>'+fb+'</b> 由备用车开行</li>';
      html+='<li>提前穿戴好劳动防护用品，向行调申请上备车，将备车开出，改开车次 <b>'+fb+'</b></li>';
      html+='<li>核对改开车次首站位置（'+term+'）及是否需开门</li>';
      html+='<li>动车前确认进路开放及核对好行车凭证</li>';
      html+='<li>打开客室照明及空调，确认好广播设置</li>';
      html+='<li>带齐行车备品：主控钥匙、绝缘靴（做好交接确认）</li>';
      html+='</ol></div>'
    }else{
      html+='<div class="flow-arrow">→</div><div class="flow-box"><div>接车</div><div class="num" style="color:rgba(255,255,255,.4)">无pickup</div></div></div><div style="font-size:14px;color:rgba(255,255,255,.4);margin-top:10px">⚠ 折返后车次无 pickup 数据</div>'
    }
  }
  html+='</div>';
  r.innerHTML=html
}

document.getElementById('faultTrain').addEventListener('keydown',function(e){if(e.key==='Enter')go()});
</script>
